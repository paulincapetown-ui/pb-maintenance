<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Bureau Platform — Hub</title>
<style>
  :root{
    --navy:#1a2332; --navy-soft:#2a3850; --ink:#1a2332; --muted:#6b7280;
    --line:#e5e7eb; --bg:#f4f5f7; --white:#fff;
    --amber:#b45309; --amber-bg:#fef3c7; --red:#b91c1c; --red-bg:#fee2e2;
    --green:#15803d; --green-bg:#dcfce7; --blue:#1d4ed8; --blue-bg:#dbeafe;
    --purple:#6d28d9; --purple-bg:#ede9fe;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  .topbar{background:var(--navy);color:#fff;display:flex;align-items:center;gap:20px;padding:0 22px;height:62px}
  .brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .brand .mark{width:30px;height:30px;border:2px solid #fff;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .brand .name{font-size:15px;font-weight:600}
  .brand .sub{font-size:11px;color:#a9b4c6}
  .searchwrap{position:relative;flex:1;max-width:520px}
  .searchwrap input{width:100%;padding:10px 14px 10px 36px;border:none;border-radius:8px;font-size:14px;font-family:inherit}
  .searchwrap .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
  .results{position:absolute;top:46px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 12px 30px rgba(0,0,0,.15);overflow:hidden;z-index:30;display:none;max-height:340px;overflow-y:auto}
  .results.show{display:block}
  .res-item{display:flex;align-items:center;gap:11px;padding:10px 13px;cursor:pointer;border-bottom:1px solid #f1f2f4}
  .res-item:last-child{border-bottom:none}
  .res-item:hover{background:#f6f8fb}
  .res-code{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;color:var(--navy);font-size:13px;min-width:62px}
  .res-meta{font-size:12.5px;color:#374151}.res-meta .sub{color:var(--muted);font-size:11.5px}
  .user{display:flex;align-items:center;gap:10px;font-size:13px;color:#cdd5e1;flex-shrink:0}
  .user .avatar{width:30px;height:30px;border-radius:50%;background:var(--navy-soft);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff}

  .shell{display:flex;min-height:calc(100vh - 62px)}
  .sidebar{width:200px;background:#fff;border-right:1px solid var(--line);padding:14px 10px;flex-shrink:0}
  .nav-group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:8px 12px 4px}
  .nav-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:7px;color:#374151;font-weight:500;margin-bottom:2px;font-size:13.5px;text-decoration:none;cursor:pointer}
  .nav-item:hover{background:#f1f2f4}.nav-item.active{background:var(--navy);color:#fff}
  .nav-item .badge{font-size:11px;font-weight:600;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px}
  .nav-item.active .badge{background:#fff;color:var(--navy)}
  .main{flex:1;padding:22px 26px;overflow:auto}
  .page-title{font-size:21px;font-weight:600;margin-bottom:4px}
  .page-sub{font-size:13px;color:var(--muted);margin-bottom:18px}

  .toolbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .toolbar input,.toolbar select{padding:8px 11px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;background:#fff}
  .toolbar input[type=text]{flex:1;min-width:200px}
  .table-wrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line);background:#fafafa}
  td{padding:11px 14px;border-bottom:1px solid #f1f2f4;font-size:13px}
  tr:last-child td{border-bottom:none}
  tr.clickable:hover{background:#f8f9fb;cursor:pointer}
  .code{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;color:var(--navy)}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
  .tag.portfolio{background:var(--navy);color:#fff}.tag.agent{background:var(--purple-bg);color:var(--purple)}
  .tag.agent.none{background:#fff3cd;color:#92760a}
  .muted{color:var(--muted)} .loading{padding:40px;text-align:center;color:var(--muted)}
  .btn{border:none;border-radius:7px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-primary{background:var(--navy);color:#fff}.btn-ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn-sm{padding:6px 11px;font-size:12px}

  .pp-head{background:#fff;border:1px solid var(--line);border-radius:11px;padding:18px 20px;margin-bottom:16px}
  .pp-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .pp-code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:26px;font-weight:700;color:var(--navy)}
  .pp-addr{font-size:15px;font-weight:500;margin-top:4px}
  .pp-tags{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:880px){.grid{grid-template-columns:1fr}}
  .panel{background:#fff;border:1px solid var(--line);border-radius:11px;padding:16px 18px}
  .panel h4{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
  .ent{padding:11px 0;border-bottom:1px solid #f1f2f4}.ent:first-of-type{padding-top:0}.ent:last-child{border-bottom:none}
  .ent .nm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
  .role{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);background:var(--blue-bg);padding:2px 7px;border-radius:5px}
  .role.co{color:var(--purple);background:var(--purple-bg)}.role.ten{color:var(--green);background:var(--green-bg)}
  .ent .ct{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.6}
  .tcode{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;color:var(--navy);background:#eef1f5;padding:1px 7px;border-radius:5px}
  .act{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid #f1f2f4;font-size:13px}.act:last-child{border-bottom:none}
  .full{grid-column:1/-1} .back{cursor:pointer;color:var(--blue);font-size:13px;margin-bottom:12px;display:inline-block}
  .note{font-size:12px;color:var(--muted);font-style:italic;margin-top:12px}

  .ua-card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--red);border-radius:8px;padding:13px 16px;margin-bottom:10px}
  .ua-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .ua-call{font-weight:600;font-size:14px}
  .ua-meta{font-size:12px;color:var(--muted);margin:2px 0 7px}
  .ua-issue{font-size:13.5px}
  .ua-foot{font-size:11.5px;color:#9ca3af;margin-top:7px}
  .form{background:#fff;border:1px solid var(--line);border-radius:11px;padding:18px 20px;max-width:620px}
  .form label{display:block;font-size:12px;font-weight:600;color:#374151;margin:12px 0 4px}
  .form input,.form select,.form textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit}
  .form textarea{min-height:80px;resize:vertical}
  .form .row{display:flex;gap:12px}.form .row>div{flex:1}
  .form .actions{margin-top:16px;display:flex;gap:10px}
  .resolved{font-size:12px;color:var(--green);margin-top:6px}
  .empty{background:#fff;border:1px dashed var(--line);border-radius:10px;padding:28px;text-align:center;color:var(--muted)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><div class="mark">PB</div>
    <div><div class="name">Property Bureau Platform</div><div class="sub">Internal operations hub</div></div></div>
  <div class="searchwrap">
    <span class="ico">⌕</span>
    <input id="search" type="text" autocomplete="off" placeholder="Search a file code or name —  L002, F038, C051, Daniels…">
    <div class="results" id="results"></div>
  </div>
  <div class="user"><span id="userName">—</span><div class="avatar" id="userAv">PB</div></div>
</div>

<div class="shell">
  <nav class="sidebar">
    <div class="nav-group-label">Daily</div>
    <a class="nav-item" id="nav-urgent" onclick="showUrgent()">Urgent Actions <span class="badge" id="ua-badge" style="display:none">0</span></a>
    <a class="nav-item active" id="nav-props" onclick="showList()">Properties</a>
    <a class="nav-item" href="./dashboard.html">Jobs</a>
    <a class="nav-item" id="nav-insp" onclick="showInspections()">Inspections</a>
    <a class="nav-item" id="nav-ren" onclick="showRenewals()">Renewals</a>
    <div class="nav-group-label">Registries</div>
    <a class="nav-item" onclick="showList()">Landlords</a>
    <a class="nav-item" onclick="showList()">Tenants</a>
  </nav>
  <main class="main" id="main"><div class="loading">Loading…</div></main>
</div>

<script>
const GAS_URL   = "https://script.google.com/macros/s/AKfycby5nKnxqm86hEwhH5Im5jTsiMRgkv7QPDcmeqcNEAAhFXHW_OwR0-4o0qEtoCkCGjraSA/exec";
const GAS_TOKEN = "PBmaint2026";

function checkSession(){
  try{ const s = JSON.parse(localStorage.getItem('pb_session') || 'null');
    if(s && s.email && (!s.expires || s.expires > Date.now())) return s; }catch(e){}
  return null;
}
const session = checkSession();
if(!session){ location.href = './dashboard.html?next=platform_hub.html'; }

const PORT_LABEL = {L:"Managed",H:"Unmanaged",F:"Pat",C:"Leonard & Nolan",G:"G"};
let PROPS=[], LL={}, TEN={}, TENCY={}, JOBS=[], UA=[], REN=[], INS=[];
const main = document.getElementById('main');

async function api(action, params){
  const u = new URL(GAS_URL); u.searchParams.set('token', GAS_TOKEN); u.searchParams.set('action', action);
  Object.keys(params||{}).forEach(k=>u.searchParams.set(k, params[k]));
  const r = await fetch(u.toString()); return r.json();
}
async function postApi(action, data){
  const body = JSON.stringify(Object.assign({token:GAS_TOKEN, action:action}, data));
  const r = await fetch(GAS_URL, {method:'POST', body:body}); return r.json();
}
function setNav(id){ document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); var el=document.getElementById(id); if(el) el.classList.add('active'); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function init(){
  if(session){ document.getElementById('userName').textContent = session.displayName || session.email;
    document.getElementById('userAv').textContent = (session.displayName||session.email).slice(0,2).toUpperCase(); }
  try{
    const [p,l,t,ty,j,u,rn,ins] = await Promise.all([
      api('getProperties'), api('getLandlords'), api('getTenants'), api('getTenancies'), api('getJobs'), api('getUrgentActions'), api('getRenewals'), api('getInspections')
    ]);
    PROPS=(p.properties||[]);
    (l.landlords||[]).forEach(x=>LL[x.landlordId]=x);
    (t.tenants||[]).forEach(x=>TEN[x.tenantId]=x);
    (ty.tenancies||[]).forEach(x=>TENCY[x.tenancyCode]=x);
    JOBS=(j.jobs||[]); UA=(u.urgentActions||[]); REN=(rn.renewals||[]); INS=(ins.inspections||[]);
    updateBadge(); showList();
  }catch(e){ main.innerHTML = '<div class="loading">Could not reach the backend. Check GAS_URL / token, then reload.</div>'; }
}
function openCount(){ return UA.filter(a=>(a.status||'').toLowerCase()!=='done').length; }
function updateBadge(){ var b=document.getElementById('ua-badge'); var n=openCount(); if(n>0){ b.textContent=n; b.style.display='inline-block'; } else b.style.display='none'; }

function showList(filter){
  setNav('nav-props');
  const rows = PROPS.filter(p=>{ if(!filter) return true; const q=filter.toLowerCase();
    return (p.clientCode||'').toLowerCase().includes(q)||(p.address||'').toLowerCase().includes(q)||(p.portfolioLabel||'').toLowerCase().includes(q)||(p.assignedAgent||'').toLowerCase().includes(q); });
  main.innerHTML = `
    <div class="page-title">Properties</div>
    <div class="page-sub">${PROPS.length} properties. Type a code in the search bar above to jump straight to one.</div>
    <div class="toolbar"><input id="flt" type="text" placeholder="Filter by code, address, portfolio or agent…" value="${esc(filter||'')}"></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Code</th><th>Address</th><th>Portfolio</th><th>Agent</th><th>Tenancy</th></tr></thead>
      <tbody>${rows.map(p=>`
        <tr class="clickable" onclick="openProfile('${p.clientCode}')">
          <td><span class="code">${esc(p.clientCode)}</span></td>
          <td>${esc(p.address)||'<span class="muted">—</span>'}</td>
          <td><span class="tag portfolio">${esc(p.portfolio)} ${esc(p.portfolioLabel)}</span></td>
          <td>${esc(p.assignedAgent)||'<span class="muted">Unassigned</span>'}</td>
          <td>${p.currentTenancyCode?('<span class="tcode">'+esc(p.currentTenancyCode)+'</span>'):'<span class="muted">—</span>'}</td>
        </tr>`).join('')}</tbody>
    </table></div>`;
  const flt = document.getElementById('flt');
  flt.addEventListener('input', ()=>showList(flt.value));
  if(filter){ flt.focus(); flt.setSelectionRange(flt.value.length,flt.value.length); }
}

function resolve(code){
  const q=String(code||'').toUpperCase().trim(); let prop,tcy;
  if(q.indexOf('/')>-1){ tcy=TENCY[q]; if(tcy) prop=PROPS.find(p=>p.propertyId===tcy.propertyId); }
  else { prop=PROPS.find(p=>(p.clientCode||'').toUpperCase()===q); if(prop) tcy=TENCY[prop.currentTenancyCode]; }
  return {prop,tcy};
}
function openProfile(code){
  const {prop,tcy}=resolve(code);
  if(!prop){ main.innerHTML='<div class="loading">No match for '+esc(code)+'.</div>'; return; }
  const owners=String(prop.landlordIds||'').split(';').map(s=>s.trim()).filter(Boolean).map(id=>LL[id]).filter(Boolean);
  const tenant=tcy?TEN[tcy.tenantId]:null;
  const a=String(prop.address||'').toLowerCase().slice(0,14);
  const jobs=JOBS.filter(j=>(String(j.clientCode||'').toUpperCase()===(prop.clientCode||'').toUpperCase())||(a&&String(j.property||'').toLowerCase().indexOf(a)>-1));
  const agentTag=prop.assignedAgent?`<span class="tag agent">AGENT · ${esc(prop.assignedAgent)}</span>`:`<span class="tag agent none">AGENT · Unassigned (handover pool)</span>`;
  const llHtml=owners.length?owners.map((l,i)=>`
    <div class="ent"><div class="nm">${esc(l.name)} <span class="role ${i>0?'co':''}">${i>0?'Co-owner':'Owner'}</span></div>
      <div class="ct">${[l.email,l.email2,l.email3].filter(Boolean).map(esc).join(' · ')||'<span class="muted">no email on file</span>'}</div></div>`).join('')
    :'<div class="muted">No landlord linked.</div>';
  const tenHtml=tenant?`<div class="ent"><div class="nm">${esc(tenant.name)||'Current tenant'} <span class="role ten">${esc(tcy.tenancyCode)}</span></div>
      <div class="ct">${[tenant.email,tenant.email2,tenant.email3].filter(Boolean).map(esc).join(' · ')||'<span class="muted">no email on file</span>'}</div></div>`
    :'<div class="muted">No current tenancy.</div>';
  const jobsHtml=jobs.length?jobs.map(j=>`<div class="act"><span>${esc(j.issueDescription||j.taskRequired||'Job')} <span class="muted">— ${esc(j.status)} ${esc(j.estCompletionDate)}</span></span></div>`).join(''):'<div class="muted">No linked jobs.</div>';
  main.innerHTML = `
    <span class="back" onclick="showList()">← All properties</span>
    <div class="pp-head"><div class="pp-top">
      <div><div class="pp-code">${esc(prop.clientCode)}</div><div class="pp-addr">${esc(prop.address)}</div></div>
      <div class="pp-tags"><span class="tag portfolio">PORTFOLIO · ${esc(prop.portfolio)} ${esc(prop.portfolioLabel)}</span>${agentTag}</div>
    </div>
    <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="showUAForm('${esc(prop.clientCode)}')">+ Flag urgent action for this property</button></div></div>
    <div class="grid">
      <div class="panel"><h4>Landlord(s)</h4>${llHtml}</div>
      <div class="panel"><h4>Current tenant</h4>${tenHtml}
        <div class="note">Only the current tenant is held. The next tenant becomes /02.</div></div>
      <div class="panel full"><h4>Linked jobs</h4>${jobsHtml}</div>
    </div>`;
}

// ── Urgent Actions ──
function showUrgent(){
  setNav('nav-urgent');
  const openA = UA.filter(a=>(a.status||'').toLowerCase()!=='done');
  const cards = openA.length ? openA.map(uaCard).join('') : '<div class="empty">No urgent actions right now. When staff flag one, it appears here and in Paul\'s 1pm email.</div>';
  main.innerHTML = `
    <div class="page-title">Urgent Actions</div>
    <div class="page-sub">Issues needing Paul to call an owner or tenant. ${openA.length} open · Paul receives these at 1pm.</div>
    <button class="btn btn-primary" onclick="showUAForm()">+ Log urgent action</button>
    <div style="margin-top:14px">${cards}</div>`;
}
function uaCard(a){
  const prop = PROPS.find(p=>(p.clientCode||'').toUpperCase()===String(a.clientCode||'').toUpperCase());
  const addr = prop?prop.address:'';
  return `<div class="ua-card"><div class="ua-top">
      <div>
        <div class="ua-call">Call ${esc(a.contactName||a.whoToCall||'contact')}${a.contactPhone?' · '+esc(a.contactPhone):''}</div>
        <div class="ua-meta">${esc(a.whoToCall)}${a.clientCode?' · '+esc(a.clientCode)+(addr?' — '+esc(addr):''):''}</div>
        <div class="ua-issue">${esc(a.issue)}</div>
        <div class="ua-foot">Flagged by ${esc(a.flaggedBy||'staff')}${a.dateFlagged?' · '+String(a.dateFlagged).slice(0,10):''}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="markDone('${esc(a.actionId)}')">Mark done</button>
    </div></div>`;
}
function showUAForm(prefillCode){
  setNav('nav-urgent');
  main.innerHTML = `
    <span class="back" onclick="showUrgent()">← Urgent actions</span>
    <div class="page-title" style="margin-top:8px">Log an urgent action</div>
    <div class="page-sub">Capture what Paul needs to deal with, who to call, and the points to raise. He sees it in the 1pm email.</div>
    <div class="form">
      <label>Property code (optional)</label>
      <input id="f-code" type="text" placeholder="e.g. L002" value="${esc(prefillCode||'')}">
      <div id="f-addr" class="resolved"></div>
      <div class="row">
        <div><label>Who must Paul call?</label>
          <select id="f-who"><option>Owner</option><option>Tenant</option><option>Other</option></select></div>
        <div><label>Contact name</label><input id="f-name" type="text" placeholder="Name to call"></div>
      </div>
      <div class="row">
        <div><label>Contact phone</label><input id="f-phone" type="text" placeholder="Number to call"></div>
        <div><label>Flagged by</label><input id="f-by" type="text" value="${esc(session?(session.displayName||session.email):'')}"></div>
      </div>
      <label>The issue / points to raise</label>
      <textarea id="f-issue" placeholder="What's the problem and what does Paul need to take up with them?"></textarea>
      <div class="actions">
        <button class="btn btn-primary" id="f-save" onclick="submitUA()">Post urgent action</button>
        <button class="btn btn-ghost" onclick="showUrgent()">Cancel</button>
      </div>
    </div>`;
  const codeEl=document.getElementById('f-code');
  codeEl.addEventListener('input', codeLookup);
  document.getElementById('f-who').addEventListener('change', codeLookup);
  if(prefillCode) codeLookup();
}
function codeLookup(){
  const code=document.getElementById('f-code').value.trim().toUpperCase();
  const who=document.getElementById('f-who').value;
  const prop=PROPS.find(p=>(p.clientCode||'').toUpperCase()===code);
  const addrEl=document.getElementById('f-addr'), nameEl=document.getElementById('f-name');
  if(!prop){ addrEl.textContent=''; return; }
  addrEl.textContent='✓ '+prop.address;
  if(who==='Owner'){ const ll=String(prop.landlordIds||'').split(';').map(s=>s.trim()).filter(Boolean).map(id=>LL[id]).filter(Boolean)[0]; if(ll && !nameEl.value) nameEl.value=ll.name; }
  else if(who==='Tenant'){ const tcy=TENCY[prop.currentTenancyCode]; const tn=tcy?TEN[tcy.tenantId]:null; if(tn && tn.name && !nameEl.value) nameEl.value=tn.name; }
}
async function submitUA(){
  const data={ clientCode:document.getElementById('f-code').value.trim().toUpperCase(),
    whoToCall:document.getElementById('f-who').value, contactName:document.getElementById('f-name').value.trim(),
    contactPhone:document.getElementById('f-phone').value.trim(), flaggedBy:document.getElementById('f-by').value.trim(),
    issue:document.getElementById('f-issue').value.trim() };
  if(!data.issue){ alert('Please describe the issue / points to raise.'); return; }
  const btn=document.getElementById('f-save'); btn.textContent='Posting…'; btn.disabled=true;
  try{ await postApi('addUrgentAction', data);
    const u=await api('getUrgentActions'); UA=(u.urgentActions||[]); updateBadge(); showUrgent();
  }catch(e){ btn.textContent='Post urgent action'; btn.disabled=false; alert('Could not post. Please retry.'); }
}
async function markDone(id){
  try{ await postApi('updateUrgentAction', {actionId:id, status:'Done', completedAt:new Date().toISOString()});
    const u=await api('getUrgentActions'); UA=(u.urgentActions||[]); updateBadge(); showUrgent();
  }catch(e){ alert('Could not update. Please retry.'); }
}

// ── Renewals ──
function showRenewals(){
  setNav('nav-ren');
  const openR = REN.filter(r=>(r.status||'').toLowerCase()!=='done').sort((a,b)=>String(a.leaseEnd).localeCompare(String(b.leaseEnd)));
  const cards = openR.length ? '<div class="table-wrap"><table><thead><tr><th>Code</th><th>Tenant</th><th>Lease end</th><th>Rent</th><th>Status</th><th></th></tr></thead><tbody>'+
    openR.map(r=>`<tr><td><span class="code">${esc(r.clientCode)}</span></td><td>${esc(r.tenant)||'—'}</td><td>${esc(r.leaseEnd)||'—'}</td><td>${esc(r.rentCurrent)||'—'}${r.rentProposed?(' → '+esc(r.rentProposed)):''}</td><td>${esc(r.renewalStatus)||'—'}</td><td><button class="btn btn-ghost btn-sm" onclick="markRenewalDone('${esc(r.renewalId)}')">Done</button></td></tr>`).join('')+'</tbody></table></div>'
    : '<div class="empty">No upcoming renewals logged yet. Add the leases coming up for renewal.</div>';
  main.innerHTML=`<div class="page-title">Renewals</div><div class="page-sub">Leases coming up for renewal. ${openR.length} open · shown in Paul's 1pm digest.</div><button class="btn btn-primary" onclick="showRenewalForm()">+ Add renewal</button><div style="margin-top:14px">${cards}</div>`;
}
function showRenewalForm(prefill){
  setNav('nav-ren');
  main.innerHTML=`<span class="back" onclick="showRenewals()">← Renewals</span><div class="page-title" style="margin-top:8px">Add a renewal</div><div class="page-sub">A lease coming up for renewal.</div>
    <div class="form"><label>Property code</label><input id="r-code" type="text" placeholder="e.g. L002" value="${esc(prefill||'')}"><div id="r-addr" class="resolved"></div>
    <div class="row"><div><label>Tenant</label><input id="r-tenant" type="text"></div><div><label>Lease end date</label><input id="r-end" type="date"></div></div>
    <div class="row"><div><label>Current rent</label><input id="r-rentc" type="text" placeholder="R"></div><div><label>Proposed rent</label><input id="r-rentp" type="text" placeholder="R (optional)"></div></div>
    <label>Renewal status</label><select id="r-status"><option>Pending</option><option>Under negotiation</option><option>Renewed</option><option>Vacating</option></select>
    <label>Notes</label><textarea id="r-notes"></textarea>
    <div class="actions"><button class="btn btn-primary" id="r-save" onclick="submitRenewal()">Save renewal</button><button class="btn btn-ghost" onclick="showRenewals()">Cancel</button></div></div>`;
  document.getElementById('r-code').addEventListener('input',renLookup); if(prefill) renLookup();
}
function renLookup(){ const p=PROPS.find(x=>(x.clientCode||'').toUpperCase()===document.getElementById('r-code').value.trim().toUpperCase()); const a=document.getElementById('r-addr'),tn=document.getElementById('r-tenant'); if(!p){a.textContent='';return;} a.textContent='✓ '+p.address; const tcy=TENCY[p.currentTenancyCode],t=tcy?TEN[tcy.tenantId]:null; if(t&&t.name&&!tn.value) tn.value=t.name; }
async function submitRenewal(){
  const data={clientCode:document.getElementById('r-code').value.trim().toUpperCase(),tenant:document.getElementById('r-tenant').value.trim(),leaseEnd:document.getElementById('r-end').value,rentCurrent:document.getElementById('r-rentc').value.trim(),rentProposed:document.getElementById('r-rentp').value.trim(),renewalStatus:document.getElementById('r-status').value,notes:document.getElementById('r-notes').value.trim()};
  if(!data.clientCode&&!data.tenant){alert('Add at least a property code or tenant.');return;}
  const b=document.getElementById('r-save'); b.textContent='Saving…'; b.disabled=true;
  try{ await postApi('addRenewal',data); const r=await api('getRenewals'); REN=(r.renewals||[]); showRenewals(); }catch(e){ b.textContent='Save renewal'; b.disabled=false; alert('Could not save. Retry.'); }
}
async function markRenewalDone(id){ try{ await postApi('updateRenewal',{renewalId:id,status:'Done'}); const r=await api('getRenewals'); REN=(r.renewals||[]); showRenewals(); }catch(e){ alert('Could not update.'); } }

// ── Inspections ──
function showInspections(){
  setNav('nav-insp');
  const openI = INS.filter(i=>(i.status||'').toLowerCase()!=='done').sort((a,b)=>String(a.dueDate).localeCompare(String(b.dueDate)));
  const cards = openI.length ? '<div class="table-wrap"><table><thead><tr><th>Code</th><th>Tenant</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>'+
    openI.map(i=>`<tr><td><span class="code">${esc(i.clientCode)}</span></td><td>${esc(i.tenant)||'—'}</td><td>${esc(i.dueDate)||'—'}</td><td>${esc(i.inspectionStatus)||'—'}</td><td><button class="btn btn-ghost btn-sm" onclick="markInspectionDone('${esc(i.inspectionId)}')">Done</button></td></tr>`).join('')+'</tbody></table></div>'
    : '<div class="empty">No upcoming inspections logged yet. Add the inspections coming up.</div>';
  main.innerHTML=`<div class="page-title">Inspections</div><div class="page-sub">Inspections coming up. ${openI.length} open · shown in Paul's 1pm digest.</div><button class="btn btn-primary" onclick="showInspectionForm()">+ Add inspection</button><div style="margin-top:14px">${cards}</div>`;
}

  try{ await postApi('addInspection',data); const r=await api('getInspections'); INS=(r.inspections||[]); showInspections(); }catch(e){ b.textContent='Save inspection'; b.disabled=false; alert('Could not save. Retry.'); }

async function markInspectionDone(id){ try{ await postApi('updateInspection',{inspectionId:id,status:'Done'}); const r=await api('getInspections'); INS=(r.inspections||[]); showInspections(); }catch(e){ alert('Could not update.'); } }

// ── Search bar ──
const search=document.getElementById('search'), results=document.getElementById('results');
search.addEventListener('input', ()=>{
  const q=search.value.trim().toLowerCase(); if(!q){results.classList.remove('show');return;}
  const list=PROPS.filter(p=>(p.clientCode||'').toLowerCase().includes(q)||(p.address||'').toLowerCase().includes(q)||(p.currentTenancyCode||'').toLowerCase().includes(q)).slice(0,12);
  if(!list.length){results.classList.remove('show');return;}
  results.innerHTML=list.map(p=>`<div class="res-item" onclick="pick('${p.clientCode}')"><span class="res-code">${esc(p.clientCode)}</span>
    <span class="res-meta">${esc(p.address)}<div class="sub">${esc((LL[String(p.landlordIds||'').split(';')[0].trim()]||{}).name||'')} · ${esc(p.portfolioLabel)}</div></span></div>`).join('');
  results.classList.add('show');
});
function pick(code){ search.value=code; results.classList.remove('show'); openProfile(code); }
search.addEventListener('keydown',e=>{ if(e.key==='Enter'){const m=resolve(search.value); if(m.prop){pick(m.prop.clientCode);} } });
document.addEventListener('click',e=>{ if(!e.target.closest('.searchwrap')) results.classList.remove('show'); });

init();
</script>
</body>
</html>
